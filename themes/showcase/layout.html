<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ profile.name }}</title>
  <link rel="stylesheet" href="/themes/showcase/style.css">
</head>
<body>
  <header class="hdr">
    <div class="wrap">
      <a class="brand" href="/">{{ profile.name }}</a>
      <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </nav>
    </div>
  </header>

  {{ content }}

  <footer class="ftr">
    <div class="wrap">
      <p>© {{ profile.name }}</p>
      {% if profile.email %}<p>{{ profile.email }}</p>{% endif %}
    </div>
  </footer>
</body>
</html>

{%- comment -%}
  layout.html — the shared wrapper for every page in this theme.
{%- endcomment -%}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ profile.name }}</title>
  <link rel="stylesheet" href="/themes/simple-basic/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">{{ profile.name }}</a>
    <nav>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ profile.name }}</p>
  </footer>
</body>
</html>
